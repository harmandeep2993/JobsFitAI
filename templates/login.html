<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JobsFitAI &mdash; Sign in</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/css/theme.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--t1);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lc {
      width: 100%;
      max-width: 340px;
      background: var(--bg-r);
      border: 1px solid var(--bd);
      border-radius: var(--radius);
      box-shadow: var(--sha-lg);
      padding: 36px 32px 32px;
    }
    .lc-brand {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 30px;
    }
    .lc-mark {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; color: #fff; letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .lc-name { font-size: 17px; font-weight: 800; letter-spacing: -0.6px; color: var(--t1); }
    .lc-name em { color: var(--accent); font-style: normal; }
    h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 4px; }
    .lc-sub { font-size: 13px; color: var(--t3); margin-bottom: 24px; }
    .lc-err {
      background: var(--red-bg);
      border: 1px solid var(--red-bd);
      color: var(--red);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      margin-bottom: 18px;
    }
    .lc-lbl {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--t2);
      margin-bottom: 5px;
    }
    .lc-inp {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid var(--bd);
      border-radius: 6px;
      background: var(--bg-c);
      color: var(--t1);
      font-size: 13.5px;
      font-family: inherit;
      margin-bottom: 14px;
      outline: none;
      transition: border-color .12s, box-shadow .12s;
    }
    .lc-inp:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-s); }
    .lc-btn {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 4px;
      transition: opacity .12s;
      letter-spacing: -0.1px;
    }
    .lc-btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="lc">
    <div class="lc-brand">
      <div class="lc-mark">JF</div>
      <span class="lc-name">Jobs<em>Fit</em>AI</span>
    </div>
    <h1>Sign in</h1>
    <p class="lc-sub">Enter your credentials to continue</p>
    {ERROR_HTML}
    <form method="post" action="/login">
      <label class="lc-lbl" for="username">Username</label>
      <input class="lc-inp" type="text" id="username" name="username"
             autocomplete="username" required autofocus/>
      <label class="lc-lbl" for="password">Password</label>
      <input class="lc-inp" type="password" id="password" name="password"
             autocomplete="current-password" required/>
      <button class="lc-btn" type="submit">Sign in &rarr;</button>
    </form>
  </div>
</body>
</html>
